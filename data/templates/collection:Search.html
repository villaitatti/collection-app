[[> collection:Header ]]

<semantic-context repository="qlever">
<div class="collection-page">
  <div class="collection-search-header">
    <!-- Title changes based on collection param -->
    <semantic-if query='ASK { BIND("[[urlParam "collection"]]" AS ?c) FILTER(?c = "berensonart") }'>
      <template id='then'><h1>Berenson Art Collection</h1></template>
      <template id='else'>
        <semantic-if query='ASK { BIND("[[urlParam "collection"]]" AS ?c) FILTER(?c = "bibber") }'>
          <template id='then'><h1>Berenson Archive</h1></template>
          <template id='else'><h1>Berenson Photo Archive</h1></template>
        </semantic-if>
      </template>
    </semantic-if>

    <!-- Collection sub-nav pills -->
    <div style="display: flex; gap: 12px; margin-top: 8px;">
      <semantic-if query='ASK { BIND("[[urlParam "collection"]]" AS ?c) FILTER(?c = "fototeca") }'>
        <template id='then'>
          <a href="/resource/collection:Search?collection=fototeca" style="font-size:14px; text-decoration:none; padding:4px 12px; border-radius:20px; color:#802126; border:1px solid #802126; font-weight:600;">Photo Berenson Archive</a>
        </template>
        <template id='else'>
          <a href="/resource/collection:Search?collection=fototeca" style="font-size:14px; color:#999; text-decoration:none; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e8;">Photo Berenson Archive</a>
        </template>
      </semantic-if>
      <semantic-if query='ASK { BIND("[[urlParam "collection"]]" AS ?c) FILTER(?c = "berensonart") }'>
        <template id='then'>
          <a href="/resource/collection:Search?collection=berensonart" style="font-size:14px; text-decoration:none; padding:4px 12px; border-radius:20px; color:#802126; border:1px solid #802126; font-weight:600;">Art Collection</a>
        </template>
        <template id='else'>
          <a href="/resource/collection:Search?collection=berensonart" style="font-size:14px; color:#999; text-decoration:none; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e8;">Art Collection</a>
        </template>
      </semantic-if>
      <semantic-if query='ASK { BIND("[[urlParam "collection"]]" AS ?c) FILTER(?c = "bibber") }'>
        <template id='then'>
          <a href="/resource/collection:Search?collection=bibber" style="font-size:14px; text-decoration:none; padding:4px 12px; border-radius:20px; color:#802126; border:1px solid #802126; font-weight:600;">Berenson Archive</a>
        </template>
        <template id='else'>
          <a href="/resource/collection:Search?collection=bibber" style="font-size:14px; color:#999; text-decoration:none; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e8;">Berenson Archive</a>
        </template>
      </semantic-if>
    </div>
  </div>

  <div class="collection-container collection-search-body">
    <semantic-search
      relations='[[> collection:SearchRelations]]'
      search-profile='[[> collection:SearchProfile]]'
    >
      <semantic-search-query-keyword
        placeholder='Search works, photographs, artists...'
        initial-input='[[urlParam "keyword"]]'
        domain="<crm:E22_Human-Made_Object>"
        default-query='
          SELECT DISTINCT ?subject WHERE {
            GRAPH ?g { ?subject a crm:E22_Human-Made_Object . }
            ?subject crm:P2_has_type <http://vocab.getty.edu/aat/300133025> .
            BIND("[[urlParam "collection"]]" AS ?collParam)
            FILTER(
              ?collParam = "" ||
              ?g = URI(CONCAT("https://sharedshelf.itatti.harvard.edu/graph/", ?collParam))
            )
            FILTER(!STRSTARTS(STR(?subject), "https://bellegreene.itatti.harvard.edu/")
                && !STRSTARTS(STR(?subject), "https://yashiro.itatti.harvard.edu/")
                && !STRSTARTS(STR(?subject), "https://mbdiaries.itatti.harvard.edu/"))
          } ORDER BY ?subject
        '
        query='
          SELECT DISTINCT ?subject WHERE {
            GRAPH ?g { ?subject a crm:E22_Human-Made_Object . }
            ?subject crm:P2_has_type <http://vocab.getty.edu/aat/300133025> .
            ?subject rdfs:label ?label .
            BIND("[[urlParam "collection"]]" AS ?collParam)
            FILTER(
              ?collParam = "" ||
              ?g = URI(CONCAT("https://sharedshelf.itatti.harvard.edu/graph/", ?collParam))
            )
            FILTER(!STRSTARTS(STR(?subject), "https://bellegreene.itatti.harvard.edu/")
                && !STRSTARTS(STR(?subject), "https://yashiro.itatti.harvard.edu/")
                && !STRSTARTS(STR(?subject), "https://mbdiaries.itatti.harvard.edu/"))
            FILTER(REGEX(?label, ?__token__, "i"))
          } ORDER BY ?label
        '
      ></semantic-search-query-keyword>

      <div class="row" style="margin-top: 16px;">
        <bs-col lg="3" md="4" sm="5">
          <div class="collection-filters-panel">
            <h4>Filters</h4>
            <semantic-search-facet
              open-by-default="true"
              facet-value-height="150px"
            ></semantic-search-facet>
          </div>
        </bs-col>

        <bs-col lg="9" md="8" sm="7">
          <semantic-search-result-holder>
            <semantic-search-result>
              <mp-sparql-result-counts id="search-count"
                query="SELECT DISTINCT * {}"
                template='{{#if hasLimit}}<div style="margin-bottom:12px; font-size:14px; color:#666;">Showing <b>{{numberOfResults}}</b> of <b>{{totalNumberOfResults}}</b> results</div>{{else}}<div style="margin-bottom:12px; font-size:14px; color:#666;"><b>{{numberOfResults}}</b> results</div>{{/if}}'
              ></mp-sparql-result-counts>
              <semantic-table
                id="search-result-table"
                query='SELECT DISTINCT ?subject WHERE {
                  OPTIONAL {
                    ?_img2 crm:P65_shows_visual_item ?_vis2 .
                    ?_vis2 crm:P138_represents ?subject .
                    ?_img2 crm:P129i_is_subject_of ?_dig3 .
                    ?_dig3 crm:P1_is_identified_by ?_url3 .
                    FILTER(ISURI(?_url3))
                    FILTER(CONTAINS(STR(?_url3), "iiif.itatti.harvard.edu") || CONTAINS(STR(?_url3), "collection.itatti.harvard.edu"))
                  }
                  OPTIONAL {
                    ?subject crm:P129i_is_subject_of ?_dig4 .
                    ?_dig4 crm:P1_is_identified_by ?_url4 .
                    FILTER(ISURI(?_url4))
                    FILTER(CONTAINS(STR(?_url4), "iiif.itatti.harvard.edu") || CONTAINS(STR(?_url4), "collection.itatti.harvard.edu"))
                  }
                  BIND(IF(BOUND(?_url3) || BOUND(?_url4), 0, 1) AS ?noImage)
                  BIND(IF(CONTAINS(STR(?subject), "/archive/bellegreene/") || CONTAINS(STR(?subject), "/archive/yashiro/") || CONTAINS(STR(?subject), "/archive/mbdiaries/"), 1, 0) AS ?isArchiveItem)
                } ORDER BY ?isArchiveItem ?noImage ?subject LIMIT 500'
                number-of-displayed-rows="15"
                tuple-template="{{> listCard}}"
                options='{"showTableHeading": false, "showFilter": false}'
                no-result-template='<div style="text-align:center; padding: 40px;"><h2 style="color: #999;">No results found</h2><p>Try broadening your search or removing some filters.</p></div>'
              >
                <template id="listCard">
                  <div class="no-spinner" style="width:100%;min-width:100%;">
                    [[> collection:CardWork]]
                  </div>
                </template>
              </semantic-table>
            </semantic-search-result>
          </semantic-search-result-holder>
        </bs-col>
      </div>
    </semantic-search>
  </div>
</div>
</semantic-context>
