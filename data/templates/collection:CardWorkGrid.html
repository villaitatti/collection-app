<div class="collection-card-grid">
  <div class="collection-card-thumb">
    <semantic-query
      query='SELECT ?imgUrl WHERE {
        BIND("/assets/images/media/image_placeholder.jpg" AS ?default)
        OPTIONAL {
          ?img crm:P65_shows_visual_item ?vis .
          ?vis crm:P138_represents <{{subject.value}}> .
          ?img crm:P129i_is_subject_of ?digital .
          ?digital crm:P1_is_identified_by ?fullUrl .
          FILTER(ISURI(?fullUrl))
          BIND(REPLACE(STR(?fullUrl), "full/full", "full/!300,300") AS ?smallUrl)
        }
        OPTIONAL {
          <{{subject.value}}> crm:P129i_is_subject_of ?digital2 .
          ?digital2 crm:P1_is_identified_by ?fullUrl2 .
          FILTER(ISURI(?fullUrl2))
          BIND(REPLACE(STR(?fullUrl2), "full/full", "full/!300,300") AS ?smallUrl2)
        }
        BIND(COALESCE(?smallUrl, ?smallUrl2, ?default) AS ?imgUrl)
      } LIMIT 1'
      template="{{> thumb}}"
    >
      <template id="thumb">
        <img src="{{bindings.0.imgUrl.value}}" alt="" style="width:100%;height:200px;object-fit:cover;" onerror="this.onerror=null;this.src='/assets/images/media/image_placeholder.jpg';" />
      </template>
    </semantic-query>
  </div>
  <div class="collection-card-body">
    <h3>
      <semantic-link iri="{{subject.value}}"></semantic-link>
    </h3>
    <semantic-query
      query='SELECT ?creator WHERE {
        <{{subject.value}}> crm:P108i_was_produced_by ?prod .
        ?prod crm:P14_carried_out_by ?c .
        ?c rdfs:label ?creator .
      } LIMIT 1'
      template="<span style='font-size:12px;color:#999;'>{{bindings.0.creator.value}}</span>"
    ></semantic-query>
  </div>
</div>
