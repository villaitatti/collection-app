[[> collection:Header ]]

<semantic-context repository="sharedshelf">
<div class="collection-page">
  <div class="collection-container collection-detail">

    <!-- Breadcrumb -->
    <div class="collection-breadcrumb">
      <semantic-link iri="collection:Search">Collections</semantic-link>
      <span class="separator">›</span>
      <semantic-link iri="collection:Search">Search</semantic-link>
      <span class="separator">›</span>
      <semantic-query query='SELECT ?label WHERE { ?? rdfs:label ?label } LIMIT 1'
        template="{{bindings.0.label.value}}"></semantic-query>
    </div>

    <!-- Header -->
    <div class="collection-detail-header">
      <!-- Type badges -->
      <semantic-query
        query='SELECT DISTINCT ?type WHERE {
          ?? crm:P2_has_type ?t .
          ?t a crm:E55_Type ; rdfs:label ?type .
        } LIMIT 4'
        template="{{> typeBadges}}"
      >
        <template id="typeBadges">
          {{#each bindings}}<span class="collection-type-badge">{{type.value}}</span>{{/each}}
        </template>
      </semantic-query>

      <!-- Source badge -->
      <semantic-query
        query='SELECT ?source ?sourceLabel WHERE {
          OPTIONAL { GRAPH <https://sharedshelf.itatti.harvard.edu/graph/berensonart> { ?? a crm:E22_Human-Made_Object } BIND("berensonart" AS ?s) BIND("Berenson Art Collection" AS ?sl) }
          OPTIONAL { GRAPH <https://sharedshelf.itatti.harvard.edu/graph/bibber> { ?? a crm:E22_Human-Made_Object } BIND("bibber" AS ?s2) BIND("Biblioteca Berenson" AS ?sl2) }
          OPTIONAL { GRAPH <https://sharedshelf.itatti.harvard.edu/graph/fototeca> { ?? a crm:E22_Human-Made_Object } BIND("fototeca" AS ?s3) BIND("Fototeca I Tatti" AS ?sl3) }
          BIND(COALESCE(?s, ?s2, ?s3) AS ?source)
          BIND(COALESCE(?sl, ?sl2, ?sl3) AS ?sourceLabel)
        } LIMIT 1'
        template="<span class='collection-card-source source-{{bindings.0.source.value}}'>{{bindings.0.sourceLabel.value}}</span>"
      ></semantic-query>

      <h1><mp-label iri="[[this]]"></mp-label></h1>

      <!-- If this is a photograph/image, show banner linking to parent work -->
      <semantic-query
        query='SELECT ?parentWork ?parentLabel (SAMPLE(?wt) AS ?workType) WHERE {
          ?? crm:P65_shows_visual_item ?vis .
          ?vis crm:P138_represents ?parentWork .
          ?parentWork a crm:E22_Human-Made_Object .
          ?parentWork crm:P2_has_type <http://vocab.getty.edu/aat/300133025> .
          ?parentWork rdfs:label ?parentLabel .
          OPTIONAL {
            ?parentWork crm:P2_has_type ?wtUri .
            ?wtUri a crm:E55_Type ; rdfs:label ?wt .
            FILTER(?wt != "works of art")
          }
        } GROUP BY ?parentWork ?parentLabel LIMIT 1'
        template="{{> parentWorkBanner}}"
      >
        <template id="parentWorkBanner">
          <div style="margin-top: 16px; padding: 16px 20px; background: #f0f6ff; border-left: 4px solid #1a73e8; border-radius: 6px;">
            <div style="font-size: 13px; color: #5f6368; margin-bottom: 6px;">📷 This image belongs to the work record:</div>
            <div style="font-size: 18px; font-weight: 600;">
              <semantic-link iri="{{bindings.0.parentWork.value}}">
                {{bindings.0.parentLabel.value}}
              </semantic-link>
              {{#if bindings.0.workType}}
                <span style="font-weight: 400; color: #80868b; font-size: 14px;"> ({{bindings.0.workType.value}})</span>
              {{/if}}
            </div>
            <div style="margin-top: 8px;">
              <semantic-link iri="{{bindings.0.parentWork.value}}" style="color: #1a73e8; font-size: 14px; text-decoration: none;">
                View full work record →
              </semantic-link>
            </div>
          </div>
        </template>
      </semantic-query>
    </div>

    <!-- Main Layout: Image + Info -->
    <div class="collection-detail-layout">

      <!-- Image Panel -->
      <div class="collection-image-panel">
        <semantic-query
          query='SELECT ?imgUrl WHERE {
            {
              # Path 1: For works — get image from linked DR record
              ?img crm:P65_shows_visual_item ?vis .
              ?vis crm:P138_represents ?? .
              ?img crm:P129i_is_subject_of ?digital .
              ?digital crm:P1_is_identified_by ?fullUrl .
              FILTER(ISURI(?fullUrl))
              OPTIONAL { ?img rdfs:label ?imgLabel }
              BIND(IF(BOUND(?imgLabel) && CONTAINS(LCASE(?imgLabel), "verso"), 1, 0) AS ?isVerso)
              BIND(REPLACE(STR(?fullUrl), "full/full", "full/!800,800") AS ?imgUrl)
            } UNION {
              # Path 2: For orphan images — direct P129i
              ?? crm:P129i_is_subject_of ?digital2 .
              ?digital2 crm:P1_is_identified_by ?fullUrl2 .
              FILTER(ISURI(?fullUrl2))
              BIND(0 AS ?isVerso)
              BIND(REPLACE(STR(?fullUrl2), "full/full", "full/!800,800") AS ?imgUrl)
            }
          } ORDER BY ?isVerso LIMIT 1'
          template="{{> imageDisplay}}"
        >
          <template id="imageDisplay">
            {{#ifCond bindings.0.imgUrl.value "==" "none"}}
              <span class="no-image">No image available</span>
            {{else}}
              <img src="{{bindings.0.imgUrl.value}}" alt="Work image" onerror="this.onerror=null;this.src='/assets/images/media/image_placeholder.jpg';" />
            {{/ifCond}}
          </template>
        </semantic-query>
      </div>

      <!-- Info Panel -->
      <div class="collection-info-panel">

        <!-- Identifiers -->
        <semantic-query
          query='SELECT ?id ?idType WHERE {
            ?? crm:P1_is_identified_by ?idNode .
            ?idNode a crm:E42_Identifier ;
                    crm:P190_has_symbolic_content ?id .
            OPTIONAL {
              ?idNode crm:P2_has_type ?idTypeUri .
              BIND(REPLACE(STR(?idTypeUri), "^.*/", "") AS ?idType)
            }
          } LIMIT 5'
          template="{{> identifiers}}"
        >
          <template id="identifiers">
            {{#each bindings}}
            <div class="collection-field">
              <div class="collection-field-label">Identifier{{#if idType}} ({{idType.value}}){{/if}}</div>
              <div class="collection-field-value">{{id.value}}</div>
            </div>
            {{/each}}
          </template>
        </semantic-query>

        <!-- Production: Creator, Role, Technique, Date -->
        <semantic-query
          query='SELECT ?creator ?creatorUri
                        (GROUP_CONCAT(DISTINCT ?role; separator=", ") AS ?roles)
                        (SAMPLE(?technique) AS ?technique)
                        (SAMPLE(?dateNote) AS ?dateNote)
                        (SAMPLE(?dateBegin) AS ?dateBegin)
                        (SAMPLE(?dateEnd) AS ?dateEnd)
          WHERE {
            ?? crm:P108i_was_produced_by ?prod .
            OPTIONAL {
              ?prod crm:P14_carried_out_by ?creatorUri .
              ?creatorUri rdfs:label ?creator .
            }
            OPTIONAL {
              ?prod crm:P2_has_type ?roleType .
              ?roleType rdfs:label ?role .
            }
            OPTIONAL {
              ?prod crm:P32_used_general_technique ?techUri .
              ?techUri rdfs:label ?technique .
            }
            OPTIONAL {
              ?prod crm:P4_has_time-span ?ts .
              ?ts crm:P3_has_note ?dateNote .
              OPTIONAL { ?ts crm:P82a_begin_of_the_begin ?dateBegin }
              OPTIONAL { ?ts crm:P82b_end_of_the_end ?dateEnd }
            }
          }
          GROUP BY ?creator ?creatorUri
          LIMIT 5'
          template="{{> productionInfo}}"
        >
          <template id="productionInfo">
            {{#each bindings}}
              {{#if creator}}
              <div class="collection-field">
                <div class="collection-field-label">Creator{{#if roles.value}} ({{roles.value}}){{/if}}</div>
                <div class="collection-field-value">
                  <semantic-link iri="{{creatorUri.value}}">{{creator.value}}</semantic-link>
                </div>
              </div>
              {{/if}}
              {{#if technique}}
              <div class="collection-field">
                <div class="collection-field-label">Technique</div>
                <div class="collection-field-value">{{technique.value}}</div>
              </div>
              {{/if}}
              {{#if dateNote}}
              <div class="collection-field">
                <div class="collection-field-label">Date</div>
                <div class="collection-field-value">
                  {{dateNote.value}}
                  {{#if dateBegin}}
                    <span style="color: #999; font-size: 13px;">({{dateBegin.value}}{{#if dateEnd}} – {{dateEnd.value}}{{/if}})</span>
                  {{/if}}
                </div>
              </div>
              {{/if}}
            {{/each}}
          </template>
        </semantic-query>

        <!-- Materials -->
        <semantic-query
          query='SELECT ?material WHERE {
            ?? crm:P45_consists_of ?matUri .
            ?matUri rdfs:label ?material .
          }'
          template="{{> materials}}"
        >
          <template id="materials">
            <div class="collection-field">
              <div class="collection-field-label">Materials</div>
              <div class="collection-field-value">
                {{#each bindings}}{{#if @index}}, {{/if}}{{material.value}}{{/each}}
              </div>
            </div>
          </template>
        </semantic-query>

        <!-- Dimensions -->
        <semantic-query
          query='SELECT ?dim WHERE {
            ?? crm:P43_has_dimension ?dimNode .
            ?dimNode crm:P3_has_note ?dim .
          } LIMIT 1'
          template="{{> dimensions}}"
        >
          <template id="dimensions">
            <div class="collection-field">
              <div class="collection-field-label">Dimensions</div>
              <div class="collection-field-value">{{bindings.0.dim.value}}</div>
            </div>
          </template>
        </semantic-query>

        <!-- Repository / Keeper -->
        <semantic-query
          query='SELECT ?keeper ?keeperUri WHERE {
            ?? crm:P50_has_current_keeper ?keeperUri .
            ?keeperUri rdfs:label ?keeper .
          } LIMIT 1'
          template="{{> keeper}}"
        >
          <template id="keeper">
            <div class="collection-field">
              <div class="collection-field-label">Repository</div>
              <div class="collection-field-value">
                <semantic-link iri="{{bindings.0.keeperUri.value}}">{{bindings.0.keeper.value}}</semantic-link>
              </div>
            </div>
          </template>
        </semantic-query>

        <!-- Current Location -->
        <semantic-query
          query='SELECT ?place WHERE {
            ?? crm:P55_has_current_location ?placeUri .
            ?placeUri rdfs:label ?place .
          } LIMIT 1'
          template="{{> location}}"
        >
          <template id="location">
            <div class="collection-field">
              <div class="collection-field-label">Current Location</div>
              <div class="collection-field-value">{{bindings.0.place.value}}</div>
            </div>
          </template>
        </semantic-query>

        <!-- Former/Current Location (e.g. site for BIBBER) -->
        <semantic-query
          query='SELECT ?place WHERE {
            ?? crm:P53_has_former_or_current_location ?placeUri .
            ?placeUri rdfs:label ?place .
          } LIMIT 1'
          template="{{> formerLocation}}"
        >
          <template id="formerLocation">
            <div class="collection-field">
              <div class="collection-field-label">Site / Location</div>
              <div class="collection-field-value">{{bindings.0.place.value}}</div>
            </div>
          </template>
        </semantic-query>

        <!-- Rights -->
        <semantic-query
          query='SELECT ?rights WHERE {
            ?? crm:P104_is_subject_to ?rightNode .
            ?rightNode crm:P3_has_note ?rights .
          } LIMIT 1'
          template="{{> rights}}"
        >
          <template id="rights">
            <div class="collection-field">
              <div class="collection-field-label">Rights</div>
              <div class="collection-field-value" style="font-size:13px;">{{bindings.0.rights.value}}</div>
            </div>
          </template>
        </semantic-query>
      </div>
    </div>

    <!-- Subjects Depicted (from the work's visual item) -->
    <semantic-query
      query='SELECT DISTINCT ?subject ?subjectLabel WHERE {
        ?? crm:P65_shows_visual_item ?vis .
        ?vis crm:P138_represents ?subject .
        ?subject rdfs:label ?subjectLabel .
        ?subject a crm:E55_Type .
      } LIMIT 20'
      template="{{> subjects}}"
    >
      <template id="subjects">
        <div class="collection-notes-section">
          <h2>Subjects Depicted</h2>
          <div class="collection-person-tags">
            {{#each bindings}}
              <span class="collection-tag">{{subjectLabel.value}}</span>
            {{/each}}
          </div>
        </div>
      </template>
    </semantic-query>

    <!-- Persons Depicted (from the work's visual item) -->
    <semantic-query
      query='SELECT DISTINCT ?person ?personLabel (SAMPLE(?thumbUrl) AS ?thumb) WHERE {
        ?? crm:P65_shows_visual_item ?vis .
        ?vis crm:P138_represents ?person .
        ?person a crm:E21_Person ;
                rdfs:label ?personLabel .
        OPTIONAL {
          ?someImg crm:P65_shows_visual_item ?imgVis .
          ?imgVis crm:P138_represents ?someWork .
          ?someWork a crm:E22_Human-Made_Object .
          ?someWork crm:P65_shows_visual_item ?wVis .
          ?wVis crm:P138_represents ?person .
          ?someImg crm:P129i_is_subject_of ?digital .
          ?digital crm:P1_is_identified_by ?fullUrl .
          FILTER(ISURI(?fullUrl))
          OPTIONAL { ?someImg rdfs:label ?imgLbl }
          FILTER(!BOUND(?imgLbl) || !CONTAINS(LCASE(?imgLbl), "verso"))
          BIND(REPLACE(STR(?fullUrl), "full/full", "full/!120,120") AS ?thumbUrl)
        }
      } GROUP BY ?person ?personLabel
      LIMIT 20'
      template="{{> depictedPersons}}"
    >
      <template id="depictedPersons">
        <div class="collection-notes-section">
          <h2>Persons Depicted</h2>
          <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 12px;">
            {{#each bindings}}
              <div style="text-align: center; width: 100px;">
                <semantic-link iri="{{person.value}}" style="text-decoration: none; color: inherit;">
                  {{#if thumb}}
                    <img src="{{thumb.value}}" alt="{{personLabel.value}}"
                         style="width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid #e0e0e0; margin-bottom: 6px;"
                         onerror="this.onerror=null;this.parentNode.innerHTML='<div style=\'width:72px;height:72px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 6px;\'>👤</div>'" />
                  {{else}}
                    <div style="width: 72px; height: 72px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 6px;">👤</div>
                  {{/if}}
                  <div style="font-size: 12px; font-weight: 500; line-height: 1.3; color: #333;">{{personLabel.value}}</div>
                </semantic-link>
              </div>
            {{/each}}
          </div>
        </div>
      </template>
    </semantic-query>

    <!-- Inscriptions -->
    <semantic-query
      query='SELECT ?inscription WHERE {
        ?? crm:P128_carries ?inscNode .
        ?inscNode crm:P190_has_symbolic_content ?inscription .
      }'
      template="{{> inscriptions}}"
    >
      <template id="inscriptions">
        <div class="collection-notes-section">
          <h2>Inscriptions</h2>
          {{#each bindings}}
          <div class="collection-note-item" style="font-style: italic;">{{inscription.value}}</div>
          {{/each}}
        </div>
      </template>
    </semantic-query>

    <!-- Notes -->
    <semantic-query
      query='SELECT ?note WHERE {
        ?? crm:P3_has_note ?note .
      } LIMIT 10'
      template="{{> notes}}"
    >
      <template id="notes">
        <div class="collection-notes-section">
          <h2>Notes</h2>
          {{#each bindings}}
          <div class="collection-note-item">{{note.value}}</div>
          {{/each}}
        </div>
      </template>
    </semantic-query>

    <!-- All photograph records for this work (with thumbnails) -->
    <semantic-query
      query='SELECT DISTINCT ?photo ?photoLabel ?imgUrl WHERE {
        ?photo crm:P65_shows_visual_item ?vis .
        ?vis crm:P138_represents ?? .
        OPTIONAL { ?photo rdfs:label ?photoLabel }
        OPTIONAL {
          ?photo crm:P129i_is_subject_of ?digital .
          ?digital crm:P1_is_identified_by ?fullUrl .
          FILTER(ISURI(?fullUrl))
          BIND(REPLACE(STR(?fullUrl), "full/full", "full/!200,200") AS ?imgUrl)
        }
      } LIMIT 20'
      template="{{> relatedPhotos}}"
    >
      <template id="relatedPhotos">
        {{#if bindings.length}}
        <div class="collection-related-section">
          <h2>Photographs ({{bindings.length}})</h2>
          <div class="collection-related-grid">
            {{#each bindings}}
              <div class="collection-card-grid" style="height: auto;">
                {{#if imgUrl}}
                <div class="collection-card-thumb" style="height: 160px;">
                  <img src="{{imgUrl.value}}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.src='/assets/images/media/image_placeholder.jpg';" />
                </div>
                {{/if}}
                <div class="collection-card-body" style="padding: 12px;">
                  <h3 style="font-size:13px;">
                    {{#if photoLabel}}<semantic-link iri="{{photo.value}}">{{photoLabel.value}}</semantic-link>
                    {{else}}<semantic-link iri="{{photo.value}}"></semantic-link>{{/if}}
                  </h3>
                </div>
              </div>
            {{/each}}
          </div>
        </div>
        {{/if}}
      </template>
    </semantic-query>

  </div>
</div>
</semantic-context>
