<!-- Shared E22_Human-Made_Object template — routes to the correct app-specific view -->
<semantic-if query='ASK { FILTER(STRSTARTS(STR(??), "https://sharedshelf.itatti.harvard.edu/")) }'>
  <template id='then'>
    [[> collection:ObjectView ]]
  </template>
  <template id='else'>
    <semantic-if query='ASK { FILTER(STRSTARTS(STR(??), "https://bellegreene.itatti.harvard.edu/")) }'>
      <template id='then'>
        [[> bellegreene:Letter ]]
      </template>
      <template id='else'>
        <semantic-if query='ASK { FILTER(STRSTARTS(STR(??), "https://mbdiaries.itatti.harvard.edu/")) }'>
          <template id='then'>
            [[> mbdiaries-ontology:Diary ]]
          </template>
          <template id='else'>
            <!-- Generic fallback for unknown E22 URIs -->
            <div style="max-width: 800px; margin: 40px auto; padding: 24px;">
              <h1><mp-label iri="[[this]]"></mp-label></h1>
              <p>Object resource: <code>[[this]]</code></p>
            </div>
          </template>
        </semantic-if>
      </template>
    </semantic-if>
  </template>
</semantic-if>
