[[> collection:Header ]]

<semantic-context repository="sharedshelf">
<div class="collection-page">
  <div class="collection-container collection-detail">

    <!-- Breadcrumb -->
    <div class="collection-breadcrumb">
      <semantic-link iri="collection:Search">Collections</semantic-link>
      <span class="separator">›</span>
      <semantic-link iri="collection:Repositories">Repositories</semantic-link>
      <span class="separator">›</span>
      <mp-label iri="[[this]]"></mp-label>
    </div>

    <!-- Group Header -->
    <div class="collection-person-header">
      <div class="collection-person-avatar">🏛</div>
      <div class="collection-person-info">
        <h1><mp-label iri="[[this]]"></mp-label></h1>

        <!-- Formation date -->
        <semantic-query
          query='SELECT ?formDate ?formPlace WHERE {
            OPTIONAL {
              ?formation a crm:E66_Formation ; crm:P95_has_formed ?? .
              ?formation crm:P4_has_time-span ?fts .
              ?fts crm:P82a_begin_of_the_begin ?formDate .
              OPTIONAL { ?formation crm:P7_took_place_at ?fp . ?fp rdfs:label ?formPlace }
            }
          } LIMIT 1'
          template="{{> formationDate}}"
        >
          <template id="formationDate">
            {{#if bindings.0.formDate}}
            <div class="collection-person-dates">
              Founded: {{bindings.0.formDate.value}}{{#if bindings.0.formPlace}} ({{bindings.0.formPlace.value}}){{/if}}
            </div>
            {{/if}}
          </template>
        </semantic-query>

        <!-- Tags: Type -->
        <div class="collection-person-tags">
          <semantic-query
            query='SELECT DISTINCT ?tag WHERE {
              ?? crm:P2_has_type ?typeUri .
              ?typeUri rdfs:label ?tag .
            } LIMIT 6'
            template="{{> tags}}"
          >
            <template id="tags">
              {{#each bindings}}<span class="collection-tag">{{tag.value}}</span>{{/each}}
            </template>
          </semantic-query>
        </div>

        <!-- ULAN Link -->
        <semantic-query
          query='SELECT ?ulan WHERE {
            ?? owl:sameAs ?ulan .
            FILTER(CONTAINS(STR(?ulan), "vocab.getty.edu/ulan"))
          } LIMIT 1'
          template="{{> ulanLink}}"
        >
          <template id="ulanLink">
            <div style="margin-top: 12px;">
              <a href="{{bindings.0.ulan.value}}" target="_blank" class="collection-external-link">
                ↗ View on Getty ULAN
              </a>
            </div>
          </template>
        </semantic-query>
      </div>
    </div>

    <!-- Alternative Names -->
    <semantic-query
      query='SELECT ?name WHERE {
        ?? crm:P1_is_identified_by ?nameNode .
        ?nameNode a crm:E41_Appellation ;
                  crm:P190_has_symbolic_content ?name .
      }'
      template="{{> altNames}}"
    >
      <template id="altNames">
        <div class="collection-info-panel" style="margin-bottom: 24px;">
          <div class="collection-field">
            <div class="collection-field-label">Known Names</div>
            <div class="collection-field-value">
              {{#each bindings}}{{#if @index}} · {{/if}}{{name.value}}{{/each}}
            </div>
          </div>
        </div>
      </template>
    </semantic-query>

    <!-- Works kept by this institution -->
    <semantic-query
      query='SELECT DISTINCT ?work ?label (SAMPLE(?imgUrl) AS ?thumb) (SAMPLE(?date0) AS ?date) (SAMPLE(?creator0) AS ?creator) WHERE {
        ?work crm:P50_has_current_keeper ?? .
        ?work rdfs:label ?label .
        OPTIONAL {
          ?work crm:P108i_was_produced_by ?prod .
          ?prod crm:P14_carried_out_by ?c .
          ?c rdfs:label ?creator0 .
        }
        OPTIONAL {
          ?work crm:P108i_was_produced_by ?prod2 .
          ?prod2 crm:P4_has_time-span ?ts .
          ?ts crm:P3_has_note ?date0 .
        }
        OPTIONAL {
          ?img crm:P65_shows_visual_item ?vis .
          ?vis crm:P138_represents ?work .
          ?img crm:P129i_is_subject_of ?digital .
          ?digital crm:P1_is_identified_by ?fullUrl .
          FILTER(ISURI(?fullUrl))
          FILTER(CONTAINS(STR(?fullUrl), "iiif.itatti.harvard.edu"))
          OPTIONAL { ?img rdfs:label ?imgLbl }
          FILTER(!BOUND(?imgLbl) || !CONTAINS(LCASE(?imgLbl), "verso"))
          BIND(REPLACE(REPLACE(REPLACE(STR(?fullUrl), "https://iiif.itatti.harvard.edu/iiif/2/", "https://collection.itatti.harvard.edu/thumbs/"), "%2F", "/"), "/full/.*$", "") AS ?imgUrl)
        }
      } GROUP BY ?work ?label
      LIMIT 100'
      template="{{> worksGrid}}"
    >
      <template id="worksGrid">
        <div class="collection-related-section">
          <h2>Holdings ({{bindings.length}})</h2>
          <p style="color: #999; margin-bottom: 16px;">Works and photographs held by this institution</p>
          <div class="collection-related-grid">
            {{#each bindings}}
              <div class="collection-card-grid" style="height: auto;">
                <semantic-link iri="{{work.value}}" getlabel=false style="display:block;text-decoration:none;cursor:pointer;">
                  <div class="collection-card-thumb" style="height: 160px;">
                    {{#if thumb}}
                      <img src="{{thumb.value}}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.style.display='none';this.parentElement.insertAdjacentHTML('beforeend','<div class=\'placeholder-artwork\' style=\'width:100%;height:100%;\'></div>');" />
                    {{else}}
                      <div class="placeholder-artwork" style="width:100%;height:100%;"></div>
                    {{/if}}
                  </div>
                </semantic-link>
                <div class="collection-card-body" style="padding: 12px;">
                  <h3 style="font-size: 13px; margin-bottom: 4px;">
                    <semantic-link iri="{{work.value}}">{{label.value}}</semantic-link>
                  </h3>
                  {{#if creator}}<div style="font-size: 12px; color: #666;">{{creator.value}}</div>{{/if}}
                  {{#if date}}<div style="font-size: 11px; color: #999; margin-top: 2px;">{{date.value}}</div>{{/if}}
                </div>
              </div>
            {{/each}}
          </div>
        </div>
      </template>
    </semantic-query>

  </div>
</div>
</semantic-context>
