[[> collection:Header ]]

<semantic-context repository="sharedshelf">
<div class="collection-page">
  <div class="collection-search-header">
    <h1>Artists &amp; Photographers</h1>
    <p class="collection-subtitle">People in the Collections knowledge graph</p>
  </div>

  <div class="collection-container" style="padding-top: 32px;">
    <div class="collection-breadcrumb">
      <semantic-link iri="collection:Search">Collections</semantic-link>
      <span class="separator">›</span>
      People
    </div>

    <semantic-table
      query='
        SELECT DISTINCT ?subject ?label ?nationality ?role ?birthDate ?deathDate (COUNT(DISTINCT ?work) AS ?works) WHERE {
          ?subject a crm:E21_Person .
          ?subject rdfs:label ?label .
          OPTIONAL {
            ?subject crm:P2_has_type ?natUri .
            ?natUri rdfs:label ?nationality .
            FILTER(!CONTAINS(LCASE(?nationality), "artist"))
            FILTER(!CONTAINS(LCASE(?nationality), "photographer"))
            FILTER(!CONTAINS(LCASE(?nationality), "sitter"))
            FILTER(!CONTAINS(LCASE(?nationality), "unidentified"))
          }
          OPTIONAL {
            ?subject crm:P2_has_type ?roleUri .
            ?roleUri rdfs:label ?role .
            FILTER(CONTAINS(LCASE(?role), "artist") || CONTAINS(LCASE(?role), "photographer") || CONTAINS(LCASE(?role), "painter") || CONTAINS(LCASE(?role), "sculptor"))
          }
          OPTIONAL {
            ?birth a crm:E67_Birth ; crm:P98_brought_into_life ?subject .
            ?birth crm:P4_has_time-span ?bts .
            ?bts crm:P82a_begin_of_the_begin ?birthDate .
          }
          OPTIONAL {
            ?death a crm:E69_Death ; crm:P100_was_death_of ?subject .
            ?death crm:P4_has_time-span ?dts .
            ?dts crm:P82a_begin_of_the_begin ?deathDate .
          }
          OPTIONAL {
            ?work crm:P108i_was_produced_by ?prod .
            ?prod crm:P14_carried_out_by ?subject .
          }
        }
        GROUP BY ?subject ?label ?nationality ?role ?birthDate ?deathDate
        ORDER BY ?label
        LIMIT 500
      '
      column-configuration='[
        {"variableName": "subject", "displayName": "Person"},
        {"variableName": "label", "displayName": "Name"},
        {"variableName": "nationality", "displayName": "Nationality"},
        {"variableName": "role", "displayName": "Role"},
        {"variableName": "birthDate", "displayName": "Born"},
        {"variableName": "deathDate", "displayName": "Died"},
        {"variableName": "works", "displayName": "Works"}
      ]'
      number-of-displayed-rows="25"
      no-result-template='<p style="color: #999; text-align: center; padding: 40px;">No people found.</p>'
    ></semantic-table>
  </div>
</div>
</semantic-context>
