[[> collection:Header ]]

<semantic-context repository="qlever">
<div class="collection-page">
  <div class="collection-container collection-detail collection-detail-fullwidth">

    <!-- Breadcrumb -->
    <div class="collection-breadcrumb">
      <semantic-link iri="collection:Search">Collections</semantic-link>
      <span class="separator">›</span>
      <a href="/resource/collection:Search?collection=bibber">Berenson Archive</a>
      <span class="separator">›</span>
      <semantic-query query='SELECT ?label WHERE { ?? rdfs:label ?label } LIMIT 1'
        template="{{bindings.0.label.value}}"></semantic-query>
    </div>

    <!-- Header row: title + "See in Project" button -->
    <div class="collection-detail-header" style="display:flex; justify-content:space-between; align-items:flex-start; gap:24px;">
      <div>
        <span class="collection-badge" style="display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; background:#802126; color:white; margin-bottom:8px;">Archive</span>

        <!-- Type badge -->
        <semantic-query
          query='SELECT ?type WHERE {
            ?? crm:P2_has_type ?typeUri .
            ?typeUri a crm:E55_Type ; rdfs:label ?type .
          } LIMIT 2'
          template='{{#each bindings}}<span style="display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; background:#e8e8e8; color:#333; margin-left:6px;">{{type.value}}</span>{{/each}}'
        ></semantic-query>

        <h1 style="margin-top:8px;">
          <semantic-query query='SELECT ?label WHERE { ?? rdfs:label ?label } LIMIT 1'
            template="{{bindings.0.label.value}}"></semantic-query>
        </h1>
      </div>

      <!-- "See in Project" button — links to the resource in its original app -->
      <semantic-query
        query='SELECT ?projectUrl ?projectName WHERE {
          ?? <https://collection.itatti.harvard.edu/resource/custom/fc/seeInProject> ?projectUrl .
          BIND(STR(?projectUrl) AS ?puri)
          BIND(
            IF(CONTAINS(?puri, "bellegreene"), "Belle Greene Project",
            IF(CONTAINS(?puri, "yashiro"), "Yashiro Project",
            IF(CONTAINS(?puri, "mbdiaries"), "Mary Berenson Diaries",
            "Original Project"))) AS ?projectName)
        } LIMIT 1'
        template='{{> seeInProject}}'
      >
        <template id="seeInProject">
          <a href="{{bindings.0.projectUrl.value}}"
             target="_blank"
             style="display:inline-flex; align-items:center; gap:6px; padding:10px 20px; background:#802126; color:white; border-radius:6px; text-decoration:none; font-size:14px; font-weight:600; white-space:nowrap; margin-top:12px;">
            See in {{bindings.0.projectName.value}} &#8599;
          </a>
        </template>
      </semantic-query>
    </div>

    <!-- Two-column layout: image + metadata -->
    <div style="display:flex; gap:32px; margin-top:24px; flex-wrap:wrap;">

      <!-- Left: Image -->
      <div style="flex:0 0 500px; max-width:500px;">
        <semantic-query
          query='SELECT ?imgUrl ?fullUrl WHERE {
              ?? fr:Work_depicted_by_Photo ?photo .
              ?photo crm:P129i_is_subject_of ?fullUrl .
              ?fullUrl crm:P2_has_type <http://vocab.getty.edu/aat/300078817> .
              BIND(REPLACE(STR(?fullUrl), "/full/full/", "/full/!600,600/") AS ?imgUrl)
          } LIMIT 1'
          template='{{> archiveImg}}'
          no-result-template=""
        >
          <template id="archiveImg">
            {{#if bindings.0.imgUrl}}
              <div style="border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                <mp-overlay-dialog title="Image viewer" type="lightbox">
                  <mp-overlay-dialog-trigger>
                    <img src="{{bindings.0.imgUrl.value}}" style="width:100%; display:block; cursor:zoom-in;" />
                  </mp-overlay-dialog-trigger>
                  <mp-overlay-dialog-content>
                    <div style="width:85vw; height:85vh;">
                      <rs-iiif-mirador
                        image-or-region='{"{{bindings.0.fullUrl.value}}":["{{bindings.0.fullUrl.value}}"]}'
                        image-id-pattern='OPTIONAL {
                          BIND(<{{bindings.0.fullUrl.value}}> AS ?imageIRI)
                          BIND("image" AS ?type)
                          BIND(REPLACE(REPLACE(REPLACE(REPLACE(STR(?imageIRI), "/full/full/0/default.jpg", ""), "\\?.*$", ""), "(^.*)\\/(.*)$", "$2"), "%2F", "!") AS ?imageID)
                          BIND(?imageIRI AS ?carrierImageIRI)
                        }'
                        iiif-server-url="https://iiif.itatti.harvard.edu/iiif/2"
                      ></rs-iiif-mirador>
                    </div>
                  </mp-overlay-dialog-content>
                </mp-overlay-dialog>
              </div>
            {{/if}}
          </template>
        </semantic-query>
      </div>

      <!-- Right: Metadata fields -->
      <div style="flex:1; min-width:300px;">
        <!-- All metadata in one query -->
        <semantic-query
          query='SELECT ?sender ?receiver ?date ?place ?keeper ?type WHERE {
            OPTIONAL { ?? fr:Work_created_from_Artist ?cUri . ?cUri rdfs:label ?sender }
            OPTIONAL { ?? crm:P67_refers_to ?rUri . ?rUri a crm:E21_Person . ?rUri rdfs:label ?receiver }
            OPTIONAL { ?? fr:Work_from_Date ?date }
            OPTIONAL { ?? fr:Work_from_Place ?pUri . ?pUri rdfs:label ?place }
            OPTIONAL { ?? fr:Work_kept_by_Institution ?kUri . ?kUri rdfs:label ?keeper }
            OPTIONAL { ?? crm:P2_has_type ?tUri . ?tUri a crm:E55_Type . ?tUri rdfs:label ?type . FILTER(?type != "works of art") }
          } LIMIT 1'
          template='{{> metadataTable}}'
          no-result-template=''
        >
          <template id="metadataTable">
            <table class="table" style="background:white; border-radius:8px;">
              <tbody>
                {{#if bindings.0.sender}}<tr><td style="font-weight:600; width:140px;">Sender</td><td>{{bindings.0.sender.value}}</td></tr>{{/if}}
                {{#if bindings.0.receiver}}<tr><td style="font-weight:600; width:140px;">Receiver</td><td>{{bindings.0.receiver.value}}</td></tr>{{/if}}
                {{#if bindings.0.date}}<tr><td style="font-weight:600; width:140px;">Date</td><td>{{bindings.0.date.value}}</td></tr>{{/if}}
                {{#if bindings.0.place}}<tr><td style="font-weight:600; width:140px;">Place</td><td>{{bindings.0.place.value}}</td></tr>{{/if}}
                {{#if bindings.0.keeper}}<tr><td style="font-weight:600; width:140px;">Repository</td><td>{{bindings.0.keeper.value}}</td></tr>{{/if}}
                {{#if bindings.0.type}}<tr><td style="font-weight:600; width:140px;">Type</td><td>{{bindings.0.type.value}}</td></tr>{{/if}}
              </tbody>
            </table>
          </template>
        </semantic-query>

        <!-- Identifiers (bellegreene-specific) -->
        <semantic-query
          query='SELECT ?id ?idLabel WHERE {
            ?? crm:P1_is_identified_by ?idNode .
            ?idNode crm:P190_has_symbolic_content ?id .
            ?idNode crm:P2_has_type ?typeUri .
            BIND(REPLACE(STR(?typeUri), "^.*/", "") AS ?localName)
            FILTER(?localName != "box_number" && ?localName != "folder_number" && ?localName != "letter_number" && ?localName != "letter_id")
            BIND(
              IF(?localName = "letterhead", "Letterhead",
              IF(?localName = "notes", "Notes",
              IF(?localName = "n_pages", "Number of pages",
              IF(?localName = "citation", "Citation",
              IF(?localName = "recipient", "Recipient",
              IF(?localName = "place", "Place",
              REPLACE(REPLACE(?localName, "_", " "), "^(.)", UCASE("$1"))
              )))))) AS ?idLabel)
          } LIMIT 10'
          template='{{> idRows}}'
          no-result-template=''
        >
          <template id="idRows">
            <table class="table" style="background:white; border-radius:8px; margin-top:8px;">
              <tbody>
                {{#each bindings}}
                <tr><td style="font-weight:600; width:140px;">{{idLabel.value}}</td><td>{{id.value}}</td></tr>
                {{/each}}
              </tbody>
            </table>
          </template>
        </semantic-query>

      </div>
    </div>

  </div>
</div>
</semantic-context>
